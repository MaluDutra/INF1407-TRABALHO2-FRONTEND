<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Songlist</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1 class="logo">Songlist</h1>
    <nav id="nav"></nav>
  </header>

  <main class="conteudo-central">
    <section class="caixa-formulario">
      <h2>Entrar</h2>
      <form id="form-login">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" required />

        <label for="password">Senha</label>
        <input type="password" id="password" name="password" required />

        <p id="mensagem-erro" class="erro"></p>

        <button type="submit" class="botao">Entrar</button>
      </form>
      <p class="link-secundario"><a href="esqueci-senha.html">Esqueci minha senha</a></p>
      <p class="link-secundario">Não tem conta? <a href="cadastro.html">Criar conta</a></p>
    </section>
  </main>

  <script type="module" src="javascript/src/login.js"></script>
</body>
</html>
