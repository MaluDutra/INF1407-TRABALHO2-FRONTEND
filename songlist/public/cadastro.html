<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta - Songlist</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1 class="logo">Songlist</h1>
    <nav id="nav"></nav>
  </header>

  <main class="conteudo-central">
    <section class="caixa-formulario">
      <h2>Criar conta</h2>
      <form id="form-cadastro">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" required />

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required />

        <label for="password">Senha</label>
        <input type="password" id="password" name="password" required minlength="6" />

        <p id="mensagem-erro" class="erro"></p>
        <p id="mensagem-sucesso" class="sucesso"></p>

        <button type="submit" class="botao">Criar conta</button>
      </form>
      <p class="link-secundario">Já tem conta? <a href="login.html">Entrar</a></p>
    </section>
  </main>

  <script type="module" src="javascript/src/cadastro.js"></script>
</body>
</html>
