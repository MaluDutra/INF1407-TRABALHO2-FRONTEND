<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definir nova senha</title>
    <link rel="stylesheet" href="../css/passwordResetDone.css">

    <script type="module" src="../javascript/accounts/passwordResetDone.js"></script>
</head>

<body>
    <iframe src="../cabecalho.html" frameborder="0" width="100%" height="72" id="cabecalho"></iframe>
    <main>
        <h1>Definir nova senha</h1>
        <p>Cole o código de recuperação e escolha sua nova senha.</p>

        <form class="formulario" id="formulario">
            <table>
                <tr>
                    <th><label for="token">Código de recuperação:</label></th>
                    <td><input type="text" id="token" name="token" required></td>
                </tr>
                <tr>
                    <th><label for="novaSenha">Nova senha:</label></th>
                    <td>
                        <div class="password-container">
                            <input type="password" id="novaSenha" name="novaSenha"
                                required placeholder="Nova senha">
                            <img src="../img/eye-off.svg" alt="Mostrar senha"
                                class="eye-icon toggle-password" id="eyeIconNovaSenha">
                        </div>
                    </td>
                </tr>
                <tr>
                    <th><label for="confirmarSenha">Confirmar nova senha:</label></th>
                    <td>
                        <div class="password-container">
                            <input type="password" id="confirmarSenha" name="confirmarSenha"
                                required placeholder="Confirmar nova senha">
                            <img src="../img/eye-off.svg" alt="Mostrar senha"
                                class="eye-icon toggle-password" id="eyeIconConfirmarSenha">
                        </div>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td><input type="submit" value="Redefinir senha" id="enviaNovaSenha"></td>
                </tr>
            </table>
        </form>
        <div id="message"></div>
    </main>
</body>

</html>
