<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="../javascript/accounts/register.js"></script>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
        integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/login.css">
    <title>Cadastro de Usuário</title>
</head>

<body>
    <iframe src="../cabecalho.html" frameborder="0" width="100%" height="80" id="cabecalho"></iframe>
    <main>
        <h1>Cadastro de Usuário</h1>
        <form id="registerForm">
            <table>
                <tbody>
                    <tr>
                        <td>Username:</td>
                        <td><input type="text" name="username" id="username" required></td>
                    </tr>
                    <tr>
                        <td>E-mail:</td>
                        <td><input type="email" name="email" id="email" required></td>
                    </tr>
                    <tr>
                        <td>Senha:</td>
                        <td><input type="password" name="password" id="password" required minlength="8"></td>
                    </tr>
                    <tr>
                        <td>Confirmar senha:</td>
                        <td><input type="password" name="password_confirm" id="password_confirm" required minlength="8"></td>
                    </tr>
                    <tr>
                        <td colspan="2" align="center"><button type="submit">Registrar</button></td>
                    </tr>
                </tbody>
            </table>
        </form>
        <div id="message"></div>
        <p>Já tem conta? <a href="./login.html">Faça login</a>.</p>
    </main>
</body>

</html>
